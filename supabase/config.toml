# Supabase local development configuration.
# https://supabase.com/docs/guides/cli/config

project_id = "xidptatroxjiqoyvhnzi"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/auth/callback",
  "https://127.0.0.1:3000/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# OAuth providers are configured in the Supabase Dashboard for the hosted project.
# Uncomment and set env vars for local `supabase start` development.
#
# [auth.external.google]
# enabled = true
# client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
# secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
# skip_nonce_check = true
#
# [auth.external.apple]
# enabled = true
# client_id = "env(SUPABASE_AUTH_EXTERNAL_APPLE_CLIENT_ID)"
# secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"
